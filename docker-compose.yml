services:
  cardgen:
    build: .
    # Run as the host user so files written to the ./data bind-mount are owned
    # by you and stay editable on the host. Defaults to 1000:1000; override for
    # a different host user with: UID=$(id -u) GID=$(id -g) docker compose up
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    volumes:
      # Persisted cards + images. Directly readable/editable on the host.
      - ./data:/data
      # To use your own placeholder artwork, uncomment and point at your file:
      # - ./my-placeholder.png:/app/assets/placeholder_item.png:ro
    # environment:
      # Enable an (external) AI image provider once one is implemented:
      # - CARDGEN_IMAGE_PROVIDER=
    restart: unless-stopped
