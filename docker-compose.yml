# Reference compose file.
#
# For local building/testing this works as-is once ./data exists and is owned
# by the user set in `user:` below. For a real deployment (e.g. TrueNAS), use
# the published image, point the volume at your own dataset, and set `user:` to
# a user/group that owns that dataset.
services:
  cardgen:
    build: .
    # For deployment, replace `build: .` with your published image:
    # image: yourdockerhubname/dnd-item-card-generator:latest

    # Run as a user/group that owns the mounted data directory. The image does
    # not set a user, so choose one here (numeric uid:gid is simplest).
    user: "1000:1000"

    ports:
      - "8000:8000"

    volumes:
      # host path : container path. Point the left side at your own storage.
      # The directory must be writable by the `user:` above.
      - ./data:/data
      # To use your own placeholder artwork, also mount it over the default:
      # - ./my-placeholder.png:/app/assets/D20.png:ro

    # environment:
      # Override the data location inside the container if you like:
      # - CARDGEN_DATA_DIR=/data
      # Enable an (external) AI image provider once one is implemented:
      # - CARDGEN_IMAGE_PROVIDER=

    restart: unless-stopped
