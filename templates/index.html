<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&amp;D Item Card Generator</title>
  <link rel="stylesheet" href="/static/cropper.min.css" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body data-has-image-provider="__HAS_IMAGE_PROVIDER__">
  <header class="toolbar">
    <button id="add-card" type="button">+ Add card</button>
    <div class="toolbar-actions">
      <button id="preview" type="button">Preview</button>
      <button id="download" type="button" class="primary">Download A4 PDF</button>
    </div>
  </header>

  <main class="layout">
    <aside class="library" aria-label="Saved cards">
      <h2>Library</h2>
      <ul id="library-list"></ul>
      <p id="library-empty" class="muted">No saved cards yet.</p>
    </aside>

    <section class="builder" id="builder" aria-label="Card builder"></section>

    <aside class="preview">
      <h2>Preview</h2>
      <p id="preview-errors" class="errors" hidden></p>
      <iframe id="preview-frame" title="A4 PDF preview"></iframe>
    </aside>
  </main>

  <!-- Card editor template -->
  <template id="card-template">
    <article class="card-editor" data-id="">
      <div class="card-editor-head">
        <input class="f-title" type="text" placeholder="Item name" aria-label="Item name" />
        <label class="copies" title="How many times this card is rendered">Copies
          <input class="f-copies" type="number" min="1" step="1" value="1" />
        </label>
        <button class="del-card danger" type="button" title="Remove from list">&times;</button>
      </div>
      <div class="grid2">
        <label>Subtitle
          <input class="f-subtitle" type="text" placeholder="Weapon (battleaxe), rare" />
        </label>
        <label>Colour
          <input class="f-color" type="color" value="#2f4a63" />
          <span class="swatches" title="Colours used by other cards"></span>
        </label>
      </div>

      <div class="fontsize">
        <span>Text size</span>
        <input class="f-fontsize" type="number" min="4" max="24" step="0.5" value="8" />
        <span class="muted">pt</span>
        <button class="reset-fontsize" type="button">Restore default</button>
      </div>

      <div class="image-row">
        <img class="thumb" alt="" hidden />
        <div class="image-actions">
          <label class="filebtn">Upload image
            <input class="f-image" type="file" accept="image/png,image/jpeg,image/webp" hidden />
          </label>
          <button class="crop-btn" type="button" hidden>Crop</button>
          <button class="del-image" type="button" hidden>Remove image</button>
        </div>
      </div>

      <div class="desc">
        <div class="desc-head">
          <span>Description</span>
          <span class="muted">Markdown: Enter = line break, blank line = paragraph, <code>---</code> rule, <code>*italic*</code>, <code>**bold**</code>, <code>***bold italic***</code>, <code>[text](url)</code></span>
        </div>
        <textarea class="f-description" rows="12" placeholder="Describe the item using Markdown&#10;&#10;---&#10;&#10;**Property.** Text..."></textarea>
      </div>
    </article>
  </template>

  <!-- Crop modal -->
  <div id="crop-modal" class="modal" hidden>
    <div class="modal-box">
      <div class="crop-stage"><img id="crop-image" alt="" /></div>
      <div class="modal-actions">
        <button id="crop-cancel" type="button">Cancel</button>
        <button id="crop-apply" type="button" class="primary">Apply crop</button>
      </div>
    </div>
  </div>

  <script src="/static/cropper.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
