- title: Badge of a Very Long Name
  subtitle: Wondrous item, rare (requires attunement)
  image_path: badge.png
  color: "#7a3b2e"
  font_scale: 1.1
  description: |-
    Wearing this amulet adds a minimum of 10d8 syllables to your name. The
    effect is permanent and stacks every time the amulet is worn.

    ---

    ***Proud.*** You become unreasonably proud of your name and insist that
    anyone who addresses you uses your full name.

    ***Verbal Incapacitation.*** As an action you can force any creature with an
    Intelligence score of 1 or higher to spend its turn pronouncing your name.
